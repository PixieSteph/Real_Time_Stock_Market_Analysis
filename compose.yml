version: '3.9'

services:

  stock-pipeline:
    build: .
    container_name: stock_market_pipeline
    depends_on:
      - kafka
      - spark
      - postgres
    env_file:
      - .env
    volumes:
      - .:/app
    command: python main.py

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"

  spark:
    image: bitnami/spark:latest
    container_name: spark
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stock_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: