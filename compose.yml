services:
  python:
    build: .
    container_name: stock-python
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    command: python Producer/main.py
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_started    
    restart: on-failure

  kafka:
    image: apache/kafka:3.7.0
    container_name: stock-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: k3XNPS6jT2-0VvKu9wv4ow

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: stock-kafka-ui
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8081:8080"
    depends_on:
      - kafka

  spark-master:
    image: spark:3.5.1-python3
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master

  consumer:
    build:
      context: ./Consumer
      dockerfile: Dockerfile
    image: stream_consumer
    container_name: stock-consumer
    depends_on:
      - kafka
      - spark-master
      - postgres
    restart: unless-stopped
    volumes:
      - ivy_cache:/opt/spark/work-dir/.ivy2
      - ./Consumer:/opt/spark/work-dir/apps

  postgres:
    image: postgres:15
    container_name: stock-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: stock_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stock-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  ivy_cache:

